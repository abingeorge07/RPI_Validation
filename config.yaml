robot: "Origami_8" # 'A1', 'Origami_8', 'Origami_12'
scene: "flat" # 'obstacle', 'stair', 'flat', 'stair_simple'

write_csv: false

plt_traj: false
hardcoded: false
latency_values_acq: false
render: true

mujoco_params:
  dt: 0.001
  gravity_compensation: -1.0

hip_height: 0.27
max_height: 0.35
phi_stance_hip_front: -0.0
phi_stance_hip_hind: 0.0
phi_stance_abduction_left: 0
phi_stance_abduction_right: 0

kFL: 0
kHL: 2
kFR: 1
kHR: 3

leg_names: ["FL", "FR", "RL", "RR"]

leg_num:
  FL: 0
  FR: 1
  RL: 2
  RR: 3

hip_names:
  FL: "FL_hip"
  FR: "FR_hip"
  RL: "RL_hip"
  RR: "RR_hip"

toe_names_geom:
  FL: "FL"
  FR: "FR"
  RL: "RL"
  RR: "RR"

mass: 12.453
inertia_matrix:
  - [0.15846, 0.000122, -0.0155]
  - [0.000122, 0.469, -0.0000312]
  - [-0.0155, -0.0000312, 0.525]

robot_params:
  clearance: 0.1 # 0.4 - hip_height
  l_h: 0.085
  l1: 0.2
  l2: 0.2
  length: 0.366
  width: 0.094
  hip_offset: 0.82
  knee_offset: -1.57
  num_joints: 12
  limbs: 4
  joints_per_limb: 3
  morphology: "knees" # 'X', 'O', 'ankles', 'knees' — only used by default_gait_8dof

height_map_params:
  resolution_vfa: 0.04
  dimension_vfa: 7

sim_param:
  visual_foothold_adaptation: "height"
  gait: "crawl"
  gait_params:
    trot:
      step_freq: 1.4
      duty_factor: 0.65
      type: 0 # GaitType::TROT
    crawl:
      step_freq: 1.0
      duty_factor: 0.8
      type: 5 # GaitType::WALK
    pace:
      step_freq: 1.4
      duty_factor: 0.7
      type: 1 # GaitType::PACE
    bound:
      step_freq: 1.8
      duty_factor: 0.65
      type: 2 # GaitType::BOUNDING
    full_stance:
      step_freq: 2.0
      duty_factor: 0.65
      type: 7 # GaitType::FULL_STANCE
  com_controller: "MPCPlanner"
  controller: "Default" # 'NMPCController', 'Default'
  vel_control: false
  max_step_height: 0.081 # 0.3 * hip_height
  max_step_length: 0.12
  min_jerk: false
  obs_clearance: 0.01
  support_polygon: false
  retraction: 0.0001
  foothold_radius: 0.02
  min_step_distance: 0.05
  foothold_alpha: 1.0
  mpc_frequency: 1000
  use_inertia_recomputation: true
  stand_still_time: 1.0
  swing_generator: "scipy"
  swing_position_gain_fb: 500
  swing_velocity_gain_fb: 10
  ref_z: 0.27
  reflex_trigger_mode: "tracking"
  reflex_height_enhancement: true
  velocity_modulator: true

# robot_limb_phase: {} # get_gait_phase(sim_param.gait) -- fill as needed

obj_params:
  x0: 1.0
  y0: 1.0
  final_x: 2.0
  final_y: 0.10

high_level_param:
  dt: 0.1
  N: 10
  safety_margin: 0.1

gravity_constant: 9.81

mpc_params:
  type: "nominal"
  verbose: false
  horizon: 18
  dt: 0.02
  grf_max: 122.625 # mass * gravity_constant
  grf_min: 0
  mu: 0.5
  use_nonuniform_discretization: false
  horizon_fine_grained: 2
  dt_fine_grained: 0.01
  use_warm_start: false
  use_integrators: false
  alpha_integrator: 0.1
  integrator_cap: [0.5, 0.2, 0.2, 0.0, 0.0, 1.0]
  use_foothold_optimization: false
  use_foothold_constraints: false
  use_RTI: false
  as_rti_type: "Standard"
  as_rti_iter: 1
  use_DDP: false
  num_qp_iterations: 2
  solver_mode: "balance"
  use_input_prediction: false
  use_static_stability: false
  use_zmp_stability: false
  trot_stability_margin: 0.04
  pace_stability_margin: 0.1
  crawl_stability_margin: 0.04
  external_wrenches_compensation: true
  external_wrenches_compensation_num_step: 15
  passive_arm_compensation: true
  K_z1: [1, 1, 10]
  K_z2: [1, 4, 10]
  residual_dynamics_upper_bound: 30
  optimize_step_freq: "true"
  step_freq_available: [1.4, 1.6, 1.8, 2.0, 2.2, 2.4]
  use_residual_dynamics_decay: false
  sampling_method: "random_sampling"
  control_parametrization: "cubic_spline"
  num_splines: 2
  num_parallel_computations: 10000
  num_sampling_iterations: 1
  device: "gpu"
  sigma_cem_mppi: 3
  sigma_mppi: 3
  sigma_random_sampling: [0.2, 3, 10]
